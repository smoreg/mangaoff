server {
    server_name manga.smoreg.dev;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ZIP archives of chapters
    location /chapters/ {
        alias /opt/mangaoff/data/chapters/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Cover images
    location /covers/ {
        alias /opt/mangaoff/data/covers/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8081;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/manga.smoreg.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/manga.smoreg.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = manga.smoreg.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name manga.smoreg.dev;

    listen 80;
    return 404; # managed by Certbot
}
